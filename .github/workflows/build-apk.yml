name: Build avocasaid APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip avocasaid_easy_one_click.zip -d extracted

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd extracted/avocasaid_easy_one_click
          chmod +x gradlew || true
          ./gradlew assembleDebug || gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: avocasaid-apk
          path: extracted/avocasaid_easy_one_click/app/build/outputs/apk/debug/*.apk
