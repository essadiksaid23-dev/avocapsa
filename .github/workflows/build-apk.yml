name: Build avocasaid APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Unzip uploaded project
        run: |
          ls -la
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          echo "ZIP file is: $ZIP_FILE"
          mkdir extracted
          unzip "$ZIP_FILE" -d extracted

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: |
          PROJECT_DIR=$(dirname "$(find extracted -name settings.gradle | head -n 1)")
          echo "Project directory is: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: avocasaid-apk
          path: extracted/**/app/build/outputs/apk/debug/*.apk
